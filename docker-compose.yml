# Both images are multi-arch and publish arm64 builds, so they run on a 64-bit Pi.
# For reproducibility you can pin a specific version tag instead of `latest`
# (e.g. jvmilazz0/kavita:0.8.6, ghcr.io/advplyr/audiobookshelf:2.17.0).
services:
  # --- Kavita (books / EPUB) ---
  kavita:
    image: jvmilazz0/kavita:nightly
    container_name: kavita
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${KAVITA_CONFIG:-/srv/config/kavita}:/kavita/config
      - ${MEDIA_BOOKS:-/srv/media/books}:/books
    ports:
      - "${KAVITA_PORT:-5000}:5000"

  # --- Audiobookshelf (audio) ---
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.7.2
    container_name: audiobookshelf
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${ABS_CONFIG:-/srv/config/audiobookshelf}:/config
      - ${MEDIA_AUDIO:-/srv/media/audiobooks}:/audiobooks
      - audiobookshelf_metadata:/metadata
    ports:
      - "${ABS_PORT:-13378}:80"

# Only ABS's metadata is a named volume; Kavita config, ABS config, and all
# media live on bind-mounted host paths (set in .env), per the Pi/SSD layout.
volumes:
  audiobookshelf_metadata:
    name: audiobookshelf_metadata
