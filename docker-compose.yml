services:
  # --- Kavita (books / EPUB) ---
  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${KAVITA_CONFIG:-/srv/config/kavita}:/kavita/config
      - ${MEDIA_BOOKS:-/srv/media/books}:/books
    ports:
      - "${KAVITA_PORT:-5000}:5000"

  # --- Audiobookshelf (audio) ---
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${ABS_CONFIG:-/srv/config/audiobookshelf}:/config
      - ${MEDIA_AUDIO:-/srv/media/audiobooks}:/audiobooks
      - audiobookshelf_metadata:/metadata
    ports:
      - "${ABS_PORT:-13378}:13378"

volumes:
  kavita_config:
    name: kavita_config
  audiobookshelf_config:
    name: audiobookshelf_config
  audiobookshelf_metadata:
    name: audiobookshelf_metadata